server {
    listen 8080;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # CI PUT upload: curl -u user:pass123 -T file.csv http://host:9699/details/sources/{ts}/testResult.csv
    location /details/ {
        alias /data/details/;
        dav_methods PUT DELETE MKCOL COPY MOVE;
        dav_access user:rw group:rw all:r;
        create_full_put_path on;
    }

    # Grafana reads summary CSV and HTML reports via GET
    location /data/ {
        alias /data/;
        autoindex on;
    }
}
